      var modal = document.getElementById('residentModal');
      if (!body || !modal) return;
      
      if (title) title.innerHTML = '🏢 Resident Details &mdash; ' + escapeHtml(flatNo) + (bedNo ? '-' + escapeHtml(bedNo) : '');
      
      if (!row) {
        body.innerHTML = '<div class="muted" style="text-align: center; padding: 20px;">No details found for this unit.</div>';
        modal.classList.remove('hidden');
        return;
      }
      
      var rawStatus = String(row.statusRaw || row.status || '').toLowerCase().trim();
      var statusLabel = row.statusRaw || row.status || 'Vacant';
      var isOccupied = STATUS.OCCUPIED.indexOf(rawStatus) >= 0 ||
                       rawStatus === 'short - undernotice' ||
                       rawStatus === 'short-undernotice' ||
                       rawStatus === 'short - undernotice booked' ||
                       rawStatus === 'short-undernotice booked' ||
                       rawStatus === 'short - undernotice-booked';
      
      var html = '';
      if (isOccupied) {
        var name = row.residentName || '—';
        var phone = row.phone || '—';
        var email = row.email || '—';
        var moveIn = row.moveIn || '—';
        var moveOut = row.moveOut || '—';
        var rentStr = row.rent ? fmtINR(row.rent) : '—';
        var occType = row.occTypeRaw || row.occType || '—';
        
        var statusBadgeClass = 'seat-occupied';
        if (rawStatus === 'under notice') {
          statusBadgeClass = 'seat-undernotice';
        } else if (rawStatus === 'under notice booked' || rawStatus === 'under notice-booked') {
          statusBadgeClass = 'seat-undernoticebooked';
        } else if (rawStatus === 'short - undernotice' || rawStatus === 'short-undernotice') {
          statusBadgeClass = 'seat-shortundernotice';
        } else if (rawStatus === 'short - undernotice booked' || rawStatus === 'short-undernotice booked' || rawStatus === 'short - undernotice-booked') {
          statusBadgeClass = 'seat-shortundernoticebooked';
        }
        
        html = '<div class="res-detail-grid">' +
          '<div class="res-detail-label">Status</div>' +
          '<div><span class="status-seat ' + statusBadgeClass + '" style="cursor: default; min-width: auto; padding: 4px 12px; transform: none; box-shadow: none;">' + escapeHtml(statusLabel) + '</span></div>' +
          '<div class="res-divider"></div>' +
          '<div class="res-detail-label">Resident Name</div>' +
          '<div class="res-detail-val">' + escapeHtml(name) + '</div>' +
          '<div class="res-divider"></div>' +
          '<div class="res-detail-label">Occupancy Type</div>' +
          '<div class="res-detail-val">' + escapeHtml(occType) + '</div>' +
          '<div class="res-divider"></div>' +
          '<div class="res-detail-label">Contracted Rent</div>' +
          '<div class="res-detail-val" style="color: var(--success); font-weight: bold;">' + escapeHtml(rentStr) + '</div>' +
          '<div class="res-divider"></div>' +
          '<div class="res-detail-label">Move-In Date</div>' +
          '<div class="res-detail-val">' + escapeHtml(moveIn) + '</div>' +
          '<div class="res-detail-label">Move-Out Date</div>' +
          '<div class="res-detail-val">' + escapeHtml(moveOut) + '</div>' +
          '<div class="res-divider"></div>' +
          '<div class="res-detail-label">Contact Phone</div>' +
          '<div class="res-detail-val">' + escapeHtml(phone) + '</div>' +
          '<div class="res-detail-label">Contact Email</div>' +
          '<div class="res-detail-val" style="word-break: break-all;">' + escapeHtml(email) + '</div>' +
          '</div>';
      } else {
        var statusBadgeClass = 'seat-vacant';
        if (rawStatus === 'vacant-booked' || rawStatus === 'vacant booked' || rawStatus === 'booked') {
          statusBadgeClass = 'seat-vacantbooked';
        } else if (rawStatus === 'not for sale') {
          statusBadgeClass = 'seat-notforsale';
        }
        
        var noticeText = rawStatus === 'not for sale' ? 
          '🔒 Unit is not for sale.' : 
          '🍃 No active resident &bull; Unit is available for booking.';
        
        html = '<div class="res-detail-grid">' +
          '<div class="res-detail-label">Status</div>' +
          '<div><span class="status-seat ' + statusBadgeClass + '" style="cursor: default; min-width: auto; padding: 4px 12px; transform: none; box-shadow: none;">' + escapeHtml(statusLabel) + '</span></div>' +
          '<div class="res-divider"></div>' +
          '<div class="res-detail-label" style="grid-column: 1 / -1; justify-content: center; text-align: center; color: var(--muted); padding: 20px 0;">' +
            '<span>' + noticeText + '</span>' +
          '</div>' +
          '</div>';
      }
      
      body.innerHTML = html;
      modal.classList.remove('hidden');
    } catch (err) {
      console.error("Error in showResidentDetailsModal:", err);
      alert("Modal Display Error: " + err.message);
    }
  }
  window.showResidentDetailsModal = showResidentDetailsModal;

  /* ================ CHARTS ================ */
  function palette() {
    return [
      '#3d7a4d', '#e8a92c', '#5e9b6c', '#4570a3', '#b94545',
      '#95bf9f', '#c98a17', '#7a5f3d', '#2d5e3b', '#a87034'
    ];
  }
  function chartTextColor() { return document.body.dataset.theme === 'dark' ? '#f3f4f6' : '#1e362d'; }
  function chartGridColor() { return document.body.dataset.theme === 'dark' ? '#1d2520' : '#e3d5ca'; }

  function makeGradient(ctx, area, color) {
    if (!area) return color;
    var hex = color.replace('#', '');
    var r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);
    var grad = ctx.createLinearGradient(0, area.top, 0, area.bottom);
    grad.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',1)');
    grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0.6)');
    return grad;
  }

  var _datalabelsRegistered = false;
  function setChartDefaults() {
    if (typeof Chart === 'undefined') return;
    if (typeof ChartDataLabels !== 'undefined' && !_datalabelsRegistered) {
      Chart.register(ChartDataLabels);
      Chart.defaults.plugins.datalabels = Chart.defaults.plugins.datalabels || {};
      Chart.defaults.plugins.datalabels.display = false;
      _datalabelsRegistered = true;
    }
    Chart.defaults.font.family = "'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif";
    Chart.defaults.font.size = 12;
    Chart.defaults.font.weight = '500';
    Chart.defaults.color = chartTextColor();
    Chart.defaults.borderColor = chartGridColor();
    Chart.defaults.elements.bar.borderRadius = 6;
    Chart.defaults.elements.bar.borderSkipped = false;
    Chart.defaults.elements.point.radius = 3;
    Chart.defaults.elements.point.hoverRadius = 6;
    Chart.defaults.elements.line.tension = 0.35;
    Chart.defaults.elements.line.borderWidth = 2.5;
  }

  function makeChart(id, cfg) {
    var el = document.getElementById(id);
    if (!el) return;
    if (typeof Chart === 'undefined') { console.error('Chart.js not loaded'); return; }
    if (STATE.charts[id]) STATE.charts[id].destroy();

    setChartDefaults();
    var c = chartTextColor(), g = chartGridColor();
    cfg.options = cfg.options || {};
    cfg.options.responsive = true;
    cfg.options.maintainAspectRatio = false;

    cfg.options.animation = Object.assign({ duration: 600, easing: 'easeOutQuart' }, cfg.options.animation || {});

    cfg.options.plugins = cfg.options.plugins || {};
    cfg.options.plugins.legend = Object.assign({
      labels: { color: c, usePointStyle: true, pointStyle: 'circle', boxWidth: 8, boxHeight: 8, padding: 14, font: { size: 12, weight: '500' } },
      position: 'top', align: 'end'
    }, cfg.options.plugins.legend || {});

    cfg.options.plugins.tooltip = Object.assign({
      backgroundColor: document.body.dataset.theme === 'dark' ? 'rgba(20,24,18,0.96)' : 'rgba(20,18,12,0.94)',
      titleColor: '#fff', bodyColor: '#fff',
      borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1,
      padding: 12, cornerRadius: 8,
      titleFont: { size: 12, weight: '600' }, bodyFont: { size: 12, weight: '500' },
      boxPadding: 6, displayColors: true, usePointStyle: true
    }, cfg.options.plugins.tooltip || {});

    var isCurrency = (id === 'chartRevCity' || id === 'chartTargetAchieved');
    var formatterFn = isCurrency ? fmtINRshort : fmtNum;

    cfg.options.plugins.datalabels = Object.assign({
      display: function(context) {
        var val = context.dataset.data[context.dataIndex];
        if (!val || val === 0) return false;
        if (id === 'chartRevCity' || id === 'chartBedsCity') {
          var sum = 0;
          context.chart.data.datasets.forEach(function(ds) {
            sum += Math.abs(ds.data[context.dataIndex] || 0);
          });
          var pct = sum > 0 ? (Math.abs(val) / sum) : 0;
          if (id === 'chartRevCity' && pct < 0.08) return false;
          if (id === 'chartBedsCity' && pct < 0.06) return false;
        }
        return true;
      },
      anchor: (id === 'chartBedsCity' || id === 'chartRevCity') ? 'center' : 'end',
      align: (id === 'chartBedsCity' || id === 'chartRevCity') ? 'center' : 'end',
      color: (id === 'chartBedsCity' || id === 'chartRevCity') ? '#ffffff' : c,
      font: {
        family: "'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif",
        size: 10,
        weight: '700'
      },
      formatter: function(value) {
        return formatterFn(value);
      },
      clip: false
    }, cfg.options.plugins.datalabels || {});

    cfg.options.scales = cfg.options.scales || {};
    ['x','y'].forEach(function(k) {
      if (cfg.options.scales[k] === false) return;
      cfg.options.scales[k] = cfg.options.scales[k] || {};
      cfg.options.scales[k].ticks = Object.assign({ color: c, font: { size: 11, weight: '500' }, padding: 6 }, cfg.options.scales[k].ticks || {});
      cfg.options.scales[k].grid = Object.assign({ color: g, drawTicks: false, drawBorder: false, lineWidth: 1 }, cfg.options.scales[k].grid || {});
      cfg.options.scales[k].border = { display: false };
    });
    if (cfg.options.scales.x && cfg.options.scales.x !== false) {
      cfg.options.scales.x.grid = Object.assign(cfg.options.scales.x.grid || {}, { display: false });
    }

    if (cfg.type === 'bar' && cfg.data && cfg.data.datasets) {
      cfg.data.datasets.forEach(function(ds, i) {
        var baseColor = ds.backgroundColor || palette()[i % palette().length];
        if (typeof baseColor === 'string') {
          ds._baseColor = baseColor;
          ds.backgroundColor = function(ctx) {
            var chart = ctx.chart;
            var area = chart.chartArea;
            if (!area) return baseColor;
            return makeGradient(chart.ctx, area, baseColor);
          };
          ds.hoverBackgroundColor = baseColor;
          ds.borderRadius = 6;
        }
      });
    }

    STATE.charts[id] = new Chart(el, cfg);
  }

  /* v8.2: NEW dedicated pie/doughnut chart helper */
  function makePieChart(id, entries, label, colors) {
    var el = document.getElementById(id);
    if (!el) return;
    if (typeof Chart === 'undefined') { console.error('Chart.js not loaded'); return; }
    if (STATE.charts[id]) STATE.charts[id].destroy();

    setChartDefaults();
    var c = chartTextColor();
    colors = colors || palette();

    if (!entries || !entries.length) {
      STATE.charts[id] = new Chart(el, {
        type: 'doughnut',
        data: { labels: ['No data'], datasets: [{ data: [1], backgroundColor: ['#e8e6df'] }] },
        options: { plugins: { legend: { display: false }, tooltip: { enabled: false } } }
      });
      return;
    }

    var labels = entries.map(function(e) { return e.label; });
    var values = entries.map(function(e) { return e.value; });
    var bg = labels.map(function(_, i) { return colors[i % colors.length]; });
    var total = values.reduce(function(s, v) { return s + v; }, 0);

    var isMobile = window.innerWidth <= 700;

    STATE.charts[id] = new Chart(el, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          label: label || '',
          data: values,
          backgroundColor: bg,
          borderColor: document.body.dataset.theme === 'dark' ? '#161d18' : '#ffffff',
          borderWidth: 2,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '58%',
        animation: { duration: 700, easing: 'easeOutQuart' },
        plugins: {
          legend: {
            position: isMobile ? 'bottom' : 'right',
            labels: {
              color: c,
              boxWidth: 10, boxHeight: 10,
              padding: 10,
              font: { size: 12, weight: '500' },
              usePointStyle: true,
              pointStyle: 'circle',
              generateLabels: function(chart) {
                var data = chart.data;
                if (!data.labels || !data.labels.length) return [];
                return data.labels.map(function(lbl, i) {
                  var v = data.datasets[0].data[i] || 0;
                  var pct = total ? (v / total * 100).toFixed(1) + '%' : '';
                  return {
                    text: lbl + '  ' + pct,
                    fillStyle: data.datasets[0].backgroundColor[i],
                    strokeStyle: data.datasets[0].backgroundColor[i],
                    pointStyle: 'circle',
                    hidden: false,
                    index: i,
                    fontColor: c
                  };
                });
              }
            }
          },
          tooltip: {
            backgroundColor: document.body.dataset.theme === 'dark' ? 'rgba(20,24,18,0.96)' : 'rgba(20,18,12,0.94)',
            titleColor: '#fff', bodyColor: '#fff',
            borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1,
            padding: 12, cornerRadius: 8,
            usePointStyle: true,
            callbacks: {
              label: function(ctx) {
                var v = ctx.parsed;
                var pct = total ? (v / total * 100).toFixed(1) + '%' : '';
                return ctx.label + ': ' + fmtNum(v) + ' (' + pct + ')';
              }
            }
          },
          datalabels: {
            display: function(context) {
              var val = context.dataset.data[context.dataIndex];
              if (!val || val === 0) return false;
              if (total > 0 && (val / total) < 0.05) return false;
              return true;
            },
            anchor: 'center',
            align: 'center',
            color: '#ffffff',
            font: {
              family: "'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif",
              size: 10,
              weight: '700'
            },
            formatter: function(value) {
              var pct = total ? (value / total * 100).toFixed(0) + '%' : '';
              return pct;
            }
          }
        }
      }
    });
  }

  function kpiHtml(k) {
    var titleAttr = k.title ? ' title="' + escapeHtml(k.title) + '"' : '';
    return '<div class="kpi ' + (k.cls || '') + '"' + titleAttr + '>' +
      '<div class="kpi-label">' + k.label + '</div>' +
      '<div class="kpi-value">' + k.value + '</div>' +
      '<div class="kpi-sub">' + (k.sub || '') + '</div>' +
      '</div>';
  }

  function pulseChangedKPIs() {
    document.querySelectorAll('.kpi-value').forEach(function(el) {
      var prev = el.dataset.prev || '';
      var cur = el.textContent || '';
      if (prev && prev !== cur) {
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
      }
      el.dataset.prev = cur;
    });
  }

  function exportTableToCSV(tableSelector, filename) {
    var table = document.querySelector(tableSelector);
    if (!table) { alert('Nothing to export'); return; }
    var rows = Array.prototype.slice.call(table.querySelectorAll('tr'));
    var csv = rows.map(function(r) {
      return Array.prototype.slice.call(r.querySelectorAll('th,td')).map(function(c) {
        var t = (c.textContent || '').replace(/\s+/g, ' ').trim();
        if (t.indexOf(',') >= 0 || t.indexOf('"') >= 0 || t.indexOf('\n') >= 0) t = '"' + t.replace(/"/g, '""') + '"';
        return t;
      }).join(',');
    }).join('\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }

  function showBundleSummary() {
    var b = STATE.bundle || {}, summary;
    try {
      summary = {
        ok: b.ok, build: b.build, isAdmin: b.isAdmin, userEmail: b.userEmail, cacheHit: b.cacheHit,
        generatedAt: b.generatedAt, currentMonthLabel: b.currentMonthLabel, today: b.today,
        revenueColumn: b.revenueColumn, counts: b.counts, warnings: b.warnings
      };
    } catch (e) { summary = { error: e.message }; }
    var out = document.getElementById('bundleOut');
    if (out) out.textContent = JSON.stringify(summary, null, 2);
  }
  function runDiagnose() {
    var out = document.getElementById('diagOut');
    if (!out) { alert('Debug output element missing'); return; }
    out.textContent = '\u23F3 Running diagnose\u2026';
    showBundleSummary();
    try {
      google.script.run
        .withSuccessHandler(function(d) { try { out.textContent = JSON.stringify(d, null, 2); } catch (e) { out.textContent = 'stringify failed: ' + e.message; } })
        .withFailureHandler(function(err) { out.textContent = '\u274C Diagnose call failed:\n\n' + (err && err.message ? err.message : err); })
        .diagnose();
    } catch (e) { out.textContent = '\u274C Could not call backend: ' + e.message; }
  }

  /* ============================================================ *
   *  V9.0 ENHANCEMENT HELPERS (Modal, Cascading, Dynamic Months)
   * ============================================================ */
  function openShortcutsModal() { var m = document.getElementById('shortcutsModal'); if (m) m.classList.remove('hidden'); }
  function closeShortcutsModal() { var m = document.getElementById('shortcutsModal'); if (m) m.classList.add('hidden'); }

  function getUniqueMonthsFromData() {
    var b = STATE.bundle; if (!b) return [];
    var monthsSet = new Set();
    if (b.shortStay && b.shortStay.rows) {
      b.shortStay.rows.forEach(function(r) { if (r.month) monthsSet.add(r.month); });
    }
    if (b.lsSales && b.lsSales.rows) {
      b.lsSales.rows.forEach(function(r) { if (r.month) monthsSet.add(r.month); });
    }
    if (b.currentMonthLabel) monthsSet.add(b.currentMonthLabel);
    var monthsArr = Array.from(monthsSet);
    return monthsArr.sort(function(a, b) {
      return (parseMonthLabel(a) || new Date(0)) - (parseMonthLabel(b) || new Date(0));
    });
  }

  function getUniqueMoveInMonthsFromData() {
    var b = STATE.bundle; if (!b) return [];
    var monthsSet = new Set();
    if (b.lsSales && b.lsSales.rows) {
      b.lsSales.rows.forEach(function(r) { if (r.moveIn) monthsSet.add(r.moveIn); });
    }
    var monthsArr = Array.from(monthsSet);
    return monthsArr.sort(function(a, b) {
      return (parseMonthLabel(a) || new Date(0)) - (parseMonthLabel(b) || new Date(0));
    });
  }

  function updateCascadingFilters() {
    var b = STATE.bundle; if (!b) return;
    var cities = STATE.filters.city || [];
    var newProps = b.filters.properties || [];
    if (cities && cities.length > 0) {
      newProps = (b.filters.properties || []).filter(function(p) {
        var info = b.dimensionIndex[p];
        return info && cities.indexOf(info.city) >= 0;
      });
    }
    if (STATE.multiSelects['property']) {
      STATE.multiSelects['property'].updateItems(newProps);
      STATE.filters.property = (STATE.filters.property || []).filter(function(p) { return newProps.indexOf(p) >= 0; });
    }
  }

  function applyLSFiltersExceptMonth(rows) {
    var f = STATE.lsFilters;
    return rows.filter(function(r) {
      if (f.lsSource.length   && f.lsSource.indexOf(r.source) < 0)     return false;
      if (f.lsProperty.length && f.lsProperty.indexOf(r.property) < 0) return false;
      if (f.lsCity && f.lsCity.length && f.lsCity.indexOf(r.city) < 0) return false;
      return true;
    });
  }

})();
</script>
